db:
  source: jdbc
  connection:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    poolName: h2
  statements:
    # Create database schema
    create-pokemons: "CREATE TABLE POKEMON (id bigint auto_increment PRIMARY KEY, name VARCHAR(64) NOT NULL)"
    # Select pokemon by name
    select-pokemon-by-name: "SELECT id, name FROM POKEMON WHERE name = ?"
    # Insert records into database
    insert-pokemon: "INSERT INTO POKEMON(name) VALUES(?)"
